<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف المتابعة </title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --gold-light: #f1dfae; --gold-antique: #c5a059; --gold-deep: #b08c45;
            --emerald-deep: #062b11; --emerald-bg: #093f19; --error-red: #d32f2f;
            --tajweed-green: #388e3c; --text-light: #f4f1ea;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-color: #000;
            --input-border: #e0e0e0;
        }

        [data-theme="dark"] {
            --emerald-bg: #021408;
            --emerald-deep: #010a04;
            --card-bg: rgba(10, 30, 15, 0.98);
            --text-color: #f1dfae;
            --input-border: var(--gold-antique);
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background: radial-gradient(circle at center, var(--emerald-bg) 0%, var(--emerald-deep) 100%);
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            transition: background 0.5s ease;
        }

        .theme-toggle {
            position: fixed; top: 20px; left: 20px;
            width: 45px; height: 45px; border-radius: 50%;
            background: var(--gold-antique); color: var(--emerald-deep);
            border: 2px solid var(--gold-light); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .app-container { 
            max-width: 480px; width: 100%; background: var(--card-bg);
            border-radius: 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            border: 3px solid var(--gold-antique); overflow: hidden; position: relative;
        }

        header { 
            background: linear-gradient(135deg, var(--emerald-deep), var(--emerald-bg)); 
            color: var(--gold-light); padding: 40px 20px; border-bottom: 4px solid var(--gold-antique); text-align: center;
        }

        header h1 { font-family: 'Amiri', serif; margin: 0; font-size: 38px; color: var(--gold-light); }
        header p { font-family: 'Amiri', serif; margin: 15px 0 0; font-size: 18px; color: #fff; }

        .timer-container { text-align: center; margin-top: 20px; }
        #timerBox {
            font-size: 24px; font-weight: bold; color: var(--emerald-deep);
            background: var(--gold-light); padding: 8px 20px; border-radius: 12px;
            display: inline-block; border: 2px solid var(--gold-antique);
        }

        .content { padding: 30px; text-align: right; color: var(--text-color); }
        label { display: block; margin-top: 20px; font-weight: bold; color: var(--gold-antique); }
        
        /* تنسيق صندوق البحث */
        .search-container { position: relative; }
        #surahSearch { margin-bottom: 5px; }
        #surahResults {
            position: absolute; width: 100%; max-height: 200px; overflow-y: auto;
            background: var(--card-bg); border: 1px solid var(--gold-antique);
            border-radius: 0 0 12px 12px; z-index: 10; display: none;
        }
        .surah-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .surah-item:hover { background: var(--gold-light); color: var(--emerald-deep); }

        input, textarea, select { 
            width: 100%; padding: 14px; margin-top: 10px; border: 2px solid var(--input-border); 
            border-radius: 12px; font-family: 'Tajawal'; box-sizing: border-box; font-size: 16px;
            background: var(--card-bg); color: var(--text-color);
        }

        .quran-box { 
            background: #fffcf2; border: 2px solid var(--gold-light); padding: 20px; border-radius: 15px; 
            margin-top: 20px; min-height: 140px; max-height: 380px; overflow-y: auto; text-align: center; line-height: 3.2; 
        }
        
        .word { display: inline-block; margin: 0 5px; padding: 5px 8px; border-radius: 8px; cursor: pointer; font-family: 'Amiri', serif; font-size: 26px; transition: 0.2s; color: #000; }
        .t-1 { background-color: var(--error-red) !important; color: white !important; }
        .t-2 { background-color: var(--tajweed-green) !important; color: white !important; }

        .instruction-hint { text-align: center; background: rgba(197, 160, 89, 0.05); padding: 12px; border-radius: 12px; font-size: 14px; margin-top: 15px; border: 1px solid var(--gold-light); color: var(--text-color); }
        
        .status-container { display: flex; gap: 12px; margin-top: 15px; }
        .status-btn { flex: 1; padding: 14px; border: 2px solid var(--input-border); border-radius: 12px; cursor: pointer; font-weight: bold; background: var(--card-bg); text-align: center; color: var(--text-color); }
        .selected-pass { background: rgba(56, 142, 60, 0.1) !important; border-color: var(--tajweed-green) !important; color: var(--tajweed-green) !important; }
        .selected-fail { background: rgba(211, 47, 47, 0.1) !important; border-color: var(--error-red) !important; color: var(--error-red) !important; }
        
        .btn-send { 
            background: linear-gradient(135deg, var(--gold-antique), var(--gold-deep)); 
            color: var(--emerald-deep); border: none; padding: 20px; border-radius: 15px; 
            width: 100%; cursor: pointer; font-size: 20px; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body data-theme="light">

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="app-container">
    <header>
        <h1>مصحف المتابعة</h1>
        <p>قال ﷺ: "خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ"</p>
    </header>

    <div class="content">
        <label>👤 اسم الطالب:</label>
        <input type="text" id="studentName" placeholder="أدخل اسم الطالب">

        <label>📖 ابحث عن السورة:</label>
        <div class="search-container">
            <input type="text" id="surahSearch" placeholder="اكتب اسم السورة هنا..." oninput="filterSurahs()">
            <div id="surahResults"></div>
        </div>

        <div id="quranContainer" class="quran-box" onclick="handleInteraction(event)">
            اختر سورة، واضغط الكلمة لتحديد الخطأ..
        </div>

        <div class="instruction-hint">
            💡 ضغطة: <span style="color:var(--error-red); font-weight:bold;">🔴 تشكيل</span> | ضغطتان: <span style="color:var(--tajweed-green); font-weight:bold;">🟢 تجويد</span>
        </div>

        <label>✨ حالة التسميع:</label>
        <div class="status-container">
            <div id="passBtn" class="status-btn" onclick="setStatus('مقبول ✅')">مقبول ✅</div>
            <div id="failBtn" class="status-btn" onclick="setStatus('إعادة 🔄')">إعادة 🔄</div>
        </div>

        <textarea id="notes" rows="2" placeholder="ملاحظات إضافية..." style="margin-top: 15px;"></textarea>

        <div class="timer-container">
            <div id="timerBox">⏱️ 00:00</div>
        </div>

        <button class="btn-send" onclick="finalSend()">إرسال التقرير عبر واتساب 🚀</button>
    </div>
</div>

<script>
let allSurahs = [];
let isTimerRunning = false;

// حماية من الخروج (الاقتراح 5)
window.onbeforeunload = function() {
    if (isTimerRunning) return "هل أنت متأكد من الخروج؟ التسميع الحالي قد يضيع.";
};

function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('themeBtn');
    if (body.getAttribute('data-theme') === 'light') {
        body.setAttribute('data-theme', 'dark');
        btn.innerText = '☀️';
    } else {
        body.setAttribute('data-theme', 'light');
        btn.innerText = '🌙';
    }
}

let timerInterval;
let totalSeconds = 0;

function startTimer() {
    clearInterval(timerInterval);
    totalSeconds = 0;
    isTimerRunning = true;
    timerInterval = setInterval(() => {
        totalSeconds++;
        let mins = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
        let secs = (totalSeconds % 60).toString().padStart(2, '0');
        document.getElementById('timerBox').innerText = `⏱️ ${mins}:${secs}`;
    }, 1000);
}

function stopTimer() { 
    clearInterval(timerInterval); 
    isTimerRunning = false;
}

async function fetchSurahList() {
    try {
        const response = await fetch('https://api.alquran.cloud/v1/surah');
        const data = await response.json();
        allSurahs = data.data;
    } catch (e) { console.log("Offline mode"); }
}
fetchSurahList();

// ميزة البحث (الاقتراح 1)
function filterSurahs() {
    const query = document.getElementById('surahSearch').value;
    const results = document.getElementById('surahResults');
    if (!query) { results.style.display = 'none'; return; }
    
    const filtered = allSurahs.filter(s => s.name.includes(query));
    results.innerHTML = "";
    if (filtered.length > 0) {
        filtered.forEach(s => {
            const div = document.createElement('div');
            div.className = 'surah-item';
            div.innerText = s.name;
            div.onclick = () => selectSurah(s.number, s.name);
            results.appendChild(div);
        });
        results.style.display = 'block';
    } else {
        results.style.display = 'none';
    }
}

function selectSurah(num, name) {
    document.getElementById('surahSearch').value = name;
    document.getElementById('surahResults').style.display = 'none';
    loadSurah(num);
}

async function loadSurah(num) {
    const container = document.getElementById('quranContainer');
    startTimer();
    container.innerHTML = "جاري التحميل...";
    try {
        const response = await fetch(`https://api.alquran.cloud/v1/surah/${num}`);
        const data = await response.json();
        currentSurahName = data.data.name;
        let fullHtml = "";
        data.data.ayahs.forEach(ayah => {
            ayah.text.split(' ').forEach(w => {
                fullHtml += `<span class="word">${w}</span> `;
            });
            fullHtml += `<span style="color:var(--gold-antique)">﴿${ayah.numberInSurah}﴾</span> `;
        });
        container.innerHTML = fullHtml;
    } catch (e) { container.innerHTML = "السورة غير متوفرة بدون إنترنت."; }
}

function handleInteraction(event) {
    const target = event.target;
    if (target.classList.contains('word')) {
        if (target.classList.contains('t-1')) {
            target.classList.remove('t-1'); target.classList.add('t-2');
        } else if (target.classList.contains('t-2')) {
            target.classList.remove('t-2');
        } else {
            target.classList.add('t-1');
        }
    }
}

let selectedStatus = "";
let currentSurahName = "";

function setStatus(s) {
    selectedStatus = s;
    document.getElementById('passBtn').className = 'status-btn' + (s.includes('مقبول') ? ' selected-pass' : '');
    document.getElementById('failBtn').className = 'status-btn' + (s.includes('إعادة') ? ' selected-fail' : '');
    stopTimer();
}

function finalSend() {
    const name = document.getElementById('studentName').value;
    const tashkil = Array.from(document.querySelectorAll('.t-1')).map(el => el.innerText);
    const tajweed = Array.from(document.querySelectorAll('.t-2')).map(el => el.innerText);
    const note = document.getElementById('notes').value || "لا يوجد";
    const timeTaken = document.getElementById('timerBox').innerText.replace('⏱️ ', '');

    if (!name || !currentSurahName) return alert("يرجى كتابة الاسم واختيار السورة");

    // ميزة التميز الذهبي (الاقتراح 4)
    if (selectedStatus.includes('مقبول') && (tashkil.length + tajweed.length === 0)) {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#c5a059', '#f1dfae', '#093f19'] });
    }

    let msg = `*✨ تقرير حلقة القرآن الكريم ✨*%0a--------------------%0a*👤 الطالب:* ${name}%0a*📖 السورة:* ${currentSurahName}%0a*⏱️ مدة التسميع:* ${timeTaken}%0a*📊 عدد الأخطاء:* ${tashkil.length + tajweed.length}%0a`;
    if(tashkil.length > 0) msg += `*🔴 أخطاء التشكيل:* ${tashkil.join(' - ')}%0a`;
    if(tajweed.length > 0) msg += `*🟢 اخطاءالتجويد:* ${tajweed.join(' - ')}%0a`;
    msg += `--------------------%0a*✨ الحالة:* ${selectedStatus || "لم تحدد"}%0a*📝 الملاحظة:* ${note}%0a--------------------%0a*نفع الله به وبارك فيكم*`;
    window.open(`https://api.whatsapp.com/send?text=${msg}`, '_blank');
}
</script>
</body>
</html>
